name: Azure Static Web Apps CI/CD — Marketing Site

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/marketing-site/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, develop]
    paths:
      - 'apps/marketing-site/**'
      - '.github/workflows/azure-static-web-apps.yml'

env:
  WORKING_DIR: apps/marketing-site
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    env:
      NEXT_PUBLIC_ONBOARDING_URL: ${{ secrets.NEXT_PUBLIC_ONBOARDING_URL || 'https://tcpc.dk/signup' }}
      NEXT_PUBLIC_BACKEND_PRICE_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_PRICE_API_BASE_URL || 'https://api.tcpc.dk/v1' }}
      NEXT_PUBLIC_SIGNUP_DISABLED: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.WORKING_DIR }}

      - name: Lint
        run: pnpm lint
        working-directory: ${{ env.WORKING_DIR }}

      - name: Unit tests
        run: pnpm test:unit
        working-directory: ${{ env.WORKING_DIR }}

      - name: Build
        run: pnpm build
        working-directory: ${{ env.WORKING_DIR }}

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/marketing-site
          output_location: .next
          skip_app_build: true
          deployment_environment: >-
            ${{
              github.ref == 'refs/heads/main' && 'production' ||
              github.ref == 'refs/heads/develop' && 'staging' ||
              ''
            }}


  cleanup_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Azure Static Web Apps staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
